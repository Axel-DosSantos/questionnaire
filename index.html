<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire – Service Traiteur Obsèques</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f5f0eb; color: #2d2d2d; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 30px 16px; }
  .wrapper { width: 100%; max-width: 680px; }

  /* ── HEADER ── */
  .header { background: #3a3a3a; color: #f5f0eb; border-radius: 12px 12px 0 0; padding: 28px 32px 22px; }
  .header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: 0.03em; line-height: 1.5; margin-bottom: 8px; }
  .header p { font-size: 0.82rem; color: #b8b0a8; line-height: 1.6; }
  .progress-bar-bg { background: #555; height: 4px; margin-top: 18px; border-radius: 2px; }
  .progress-bar { background: #c9a96e; height: 4px; border-radius: 2px; transition: width 0.4s ease; }

  /* ── CARD ── */
  .card { background: #fff; border-radius: 0 0 12px 12px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); min-height: 200px; }
  .question-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: #c9a96e; margin-bottom: 10px; font-family: Arial, sans-serif; }
  .question-text { font-size: 1.05rem; line-height: 1.6; color: #1a1a1a; margin-bottom: 8px; }
  .sub-text { font-size: 0.82rem; color: #888; margin-bottom: 20px; font-family: Arial, sans-serif; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 1.5px solid #e0d8cf; border-radius: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: #faf8f5; font-family: Arial, sans-serif; font-size: 0.9rem; line-height: 1.4; }
  .option:hover { border-color: #c9a96e; background: #fdf8f0; }
  .option.selected { border-color: #c9a96e; background: #fdf5e6; }
  .option.confirmed { border-color: #a07840; background: #f5e8d0; }
  .check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .option.selected .check, .option.confirmed .check { background: #c9a96e; border-color: #c9a96e; }
  .option.selected .check::after, .option.confirmed .check::after { content: ''; width: 7px; height: 7px; background: white; border-radius: 50%; display: block; }
  .check-sq { border-radius: 4px !important; }
  .option.selected .check-sq, .option.confirmed .check-sq { background: #c9a96e; border-color: #c9a96e; }
  .option.selected .check-sq::after, .option.confirmed .check-sq::after { content: '✓'; color: white; font-size: 11px; line-height: 1; font-weight: bold; }
  .max-hint { font-size: 0.78rem; color: #aaa; font-family: Arial, sans-serif; margin-bottom: 6px; }
  .btn-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; }
  .btn-row-right { display: flex; gap: 12px; margin-left: auto; }
  .btn { padding: 12px 28px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.9rem; font-family: Arial, sans-serif; transition: all 0.18s; }
  .btn-back { background: transparent; border: 1.5px solid #ccc; color: #888; font-size: 0.85rem; padding: 10px 18px; }
  .btn-back:hover { border-color: #999; color: #333; }
  .btn-next { background: #3a3a3a; color: #f5f0eb; }
  .btn-next:hover { background: #222; }
  .btn-next:disabled { background: #ddd; color: #aaa; cursor: default; }
  .btn-submit { background: #c9a96e; color: white; }
  .btn-submit:hover { background: #b8934a; }
  textarea { width: 100%; padding: 14px; border: 1.5px solid #e0d8cf; border-radius: 8px; font-family: Arial, sans-serif; font-size: 0.9rem; color: #333; resize: vertical; min-height: 110px; background: #faf8f5; outline: none; margin-bottom: 28px; }
  textarea:focus { border-color: #c9a96e; }
  .fin-card { text-align: center; padding: 48px 32px; }
  .fin-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .fin-title { font-size: 1.3rem; margin-bottom: 12px; color: #1a1a1a; }
  .fin-sub { font-size: 0.9rem; color: #888; font-family: Arial, sans-serif; line-height: 1.6; }

  /* ── ADMIN ── */
  #adminOverlay { display:none; position:fixed; inset:0; background:#f5f0eb; z-index:100; overflow-y:auto; padding: 30px 16px 60px; }
  .admin-wrap { max-width: 900px; margin: 0 auto; }
  .admin-header { background: #3a3a3a; color: #f5f0eb; border-radius: 12px; padding: 24px 32px; margin-bottom: 24px; display:flex; align-items:center; justify-content:space-between; }
  .admin-header h2 { font-size: 1.1rem; font-weight: normal; }
  .admin-header span { font-size: 0.82rem; color: #b8b0a8; }
  .btn-admin-close { background: transparent; border: 1.5px solid #888; color: #ccc; padding: 8px 18px; border-radius: 7px; cursor:pointer; font-family: Arial, sans-serif; font-size:0.85rem; }
  .btn-admin-close:hover { border-color: #c9a96e; color: #c9a96e; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background:#fff; border-radius:10px; padding:20px 24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); text-align:center; }
  .stat-num { font-size: 2.2rem; color: #c9a96e; margin-bottom: 4px; }
  .stat-label { font-size: 0.8rem; color: #888; font-family: Arial, sans-serif; }
  .section-title { font-size: 0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:#c9a96e; font-family:Arial,sans-serif; margin: 28px 0 12px; }
  .q-block { background:#fff; border-radius:10px; padding:20px 24px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .q-block h3 { font-size:0.95rem; color:#1a1a1a; margin-bottom:14px; line-height:1.5; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-family:Arial,sans-serif; font-size:0.83rem; }
  .bar-label { width: 260px; flex-shrink:0; color:#444; }
  .bar-track { flex:1; background:#f0ebe4; border-radius:4px; height:10px; overflow:hidden; }
  .bar-fill { height:10px; background:#c9a96e; border-radius:4px; transition: width 0.6s ease; }
  .bar-count { width:40px; text-align:right; color:#888; font-size:0.8rem; }
  .responses-list { display:flex; flex-direction:column; gap:12px; }
  .response-card { border:1.5px solid #e0d8cf; border-radius:8px; padding:16px 20px; background:#faf8f5; font-family:Arial,sans-serif; font-size:0.85rem; }
  .response-card .rc-date { color:#aaa; font-size:0.75rem; margin-bottom:8px; }
  .response-card .rc-row { margin-bottom:4px; color:#444; line-height:1.5; }
  .response-card .rc-row strong { color:#2d2d2d; }
  .verbatim { background:#fff8ee; border-left:3px solid #c9a96e; padding:10px 14px; margin-top:6px; border-radius:0 6px 6px 0; font-style:italic; color:#555; }
  .login-box { background:#fff; border-radius:12px; padding:40px; max-width:360px; margin:80px auto; box-shadow:0 4px 24px rgba(0,0,0,0.1); text-align:center; }
  .login-box h2 { font-size:1.1rem; margin-bottom:8px; }
  .login-box p { font-size:0.83rem; color:#888; font-family:Arial,sans-serif; margin-bottom:24px; }
  .login-input { width:100%; padding:12px 16px; border:1.5px solid #e0d8cf; border-radius:8px; font-size:0.95rem; font-family:Arial,sans-serif; outline:none; margin-bottom:14px; background:#faf8f5; }
  .login-input:focus { border-color:#c9a96e; }
  .login-error { color:#c0392b; font-size:0.82rem; font-family:Arial,sans-serif; margin-bottom:10px; display:none; }
  .btn-login { width:100%; background:#3a3a3a; color:#f5f0eb; padding:13px; border:none; border-radius:8px; font-size:0.95rem; font-family:Arial,sans-serif; cursor:pointer; }
  .btn-login:hover { background:#222; }
  .empty-state { text-align:center; padding:48px 20px; color:#aaa; font-family:Arial,sans-serif; font-size:0.9rem; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { padding:9px 20px; border-radius:20px; border:1.5px solid #e0d8cf; background:#fff; cursor:pointer; font-family:Arial,sans-serif; font-size:0.85rem; color:#666; transition:all 0.15s; }
  .tab.active { background:#3a3a3a; color:#f5f0eb; border-color:#3a3a3a; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .btn-export { background:#c9a96e; color:white; padding:9px 20px; border:none; border-radius:7px; font-family:Arial,sans-serif; font-size:0.85rem; cursor:pointer; }
  .btn-export:hover { background:#b8934a; }

  @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
  .slide-in { animation: slideIn 0.22s ease; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Votre avis nous aidera à imaginer un service vraiment utile</h1>
    <p>Nous réfléchissons à un service de traiteur à domicile pour soulager les familles après des obsèques. Ce questionnaire est anonyme et ne prendra que quelques minutes.</p>
    <div class="progress-bar-bg"><div class="progress-bar" id="pb" style="width:0%"></div></div>
  </div>
  <div class="card" id="card"></div>
</div>

<!-- ADMIN OVERLAY -->
<div id="adminOverlay">
  <div class="admin-wrap" id="adminContent"></div>
</div>

<script>
// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
const STORAGE_KEY = 'traiteur_responses';

async function saveResponse(data) {
  try {
    let all = await loadAll();
    all.push({ ...data, id: Date.now(), date: new Date().toLocaleString('fr-FR') });
    await window.storage.set(STORAGE_KEY, JSON.stringify(all));
  } catch(e) { console.error('save error', e); }
}

async function loadAll() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    return r ? JSON.parse(r.value) : [];
  } catch(e) { return []; }
}

// ══════════════════════════════════════════
//  QUESTIONNAIRE
// ══════════════════════════════════════════
const A = {};
let hist = [];
let currentId = 'q1';
let inHesitantTail = false;
let autoTimer = null;

const steps = {
  q1:  { label:'Question 1 sur 11', text:"Dans quelle tranche d'âge vous situez-vous ?", type:'single', opts:['Moins de 30 ans','30 à 44 ans','45 à 59 ans','60 à 74 ans','75 ans et plus'] },
  q2:  { label:'Question 2 sur 11', text:"Avant aujourd'hui, saviez-vous qu'il était possible de faire appel à un traiteur à domicile pour le moment de partage qui suit des obsèques ?", type:'single', opts:['Oui','Non'] },
  q3:  { label:'Question 3 sur 11', text:"Avez-vous déjà eu à organiser tout ou partie d'un moment de partage après des obsèques ?", type:'single', opts:['Oui','Non'] },
  q3b: { label:'Question 3 sur 11 (suite)', text:"Qu'est-ce qui vous a semblé le plus difficile ?", sub:'3 réponses maximum — puis cliquez sur Continuer', type:'multi', max:3,
         opts:["Gérer les nombreuses démarches liées aux obsèques en même temps","Rester disponible pour accueillir les proches","Préparer les plats moi-même","Trouver un traiteur adapté","Gérer l'organisation et le service du repas","Faire la vaisselle et le rangement","Choisir entre un repas à domicile ou au restaurant","Rien de particulier","Autre"] },
  q4:  { label:'Question 4 sur 11', text:"Si vous deviez organiser ce moment aujourd'hui, envisageriez-vous de faire appel à un service de traiteur à domicile ?", type:'single', opts:["Oui, certainement","Oui, probablement","Je ne sais pas","Probablement pas","Non"] },
  q5:  { label:'Question 5 sur 11', text:"Qu'attendriez-vous avant tout d'un tel service ?", sub:'3 réponses maximum — puis cliquez sur Continuer', type:'multi', max:3,
         opts:["Être soulagé(e) de l'organisation du repas","Pouvoir rester auprès de mes proches","Réduire la charge mentale","Accueillir la famille sereinement à domicile","Éviter les contraintes d'un restaurant","Ne pas avoir à gérer la vaisselle ni le rangement","Offrir un moment chaleureux et convivial","Bénéficier d'un service discret et respectueux","Autre"] },
  q6:  { label:'Question 6 sur 11', text:"Quels éléments vous mettraient le plus en confiance ?", sub:'3 réponses maximum — puis cliquez sur Continuer', type:'multi', max:3,
         opts:["Des avis de familles ayant utilisé ce service","Une équipe discrète et respectueuse","Des tarifs transparents","Une expérience dans ce type d'accompagnement","Une présentation claire des prestations","Un premier échange téléphonique","Des produits de qualité","Une entreprise familiale","Autre"] },
  q7:  { label:'Question 7 sur 11', text:"Le fait que ce service soit assuré par une petite équipe familiale constitue pour vous :", type:'single', opts:["Un vrai critère de confiance","Un élément rassurant, sans être déterminant","Un point qui m'est indifférent","Un élément qui pourrait me faire hésiter"] },
  q8:  { label:'Question 8 sur 11', text:"Quel type de prestation vous semblerait le plus adapté ?", sub:'Buffet = plats en libre service · Cocktail = petites pièces à grignoter', type:'single', opts:["Buffet froid","Buffet chaud","Cocktail salé","Cocktail salé et sucré","Café, boissons et mignardises uniquement","Je ne sais pas"] },
  q9:  { label:'Question 9 sur 11', text:"Quel budget vous semblerait raisonnable pour une prestation complète (courses, préparation, livraison, installation, service et gestion de la vaisselle) ?", type:'single', opts:["Moins de 20 € par personne","Entre 20 € et 30 € par personne","Entre 30 € et 40 € par personne","Plus de 40 € par personne","Je ne sais pas"] },
  q10: { label:'Question 10 sur 11', text:"Si vous aviez besoin de ce type de prestation, comment penseriez-vous à la rechercher ?", type:'single', opts:["Je demanderais conseil à une entreprise de pompes funèbres","J'effectuerais une recherche sur Internet","Je demanderais à mes proches","Je contacterais un traiteur que je connais déjà","Je demanderais conseil à une mairie ou une association","Autre"] },
  q11: { label:'Question 5 sur 11', text:"Si vous n'envisagez pas (ou hésitez à) faire appel à ce type de service, quelles seraient vos principales raisons ?", sub:'Plusieurs réponses possibles — puis cliquez sur Continuer', type:'multi', max:99,
         opts:["Je préférerais cuisiner moi-même","Ma famille s'en chargerait","Je préférerais organiser un repas au restaurant","Je trouverais ce service trop coûteux","Je ne me sentirais pas à l'aise avec un prestataire dans ce contexte","J'aurais besoin de mieux connaître ce type de service","Je manquerais de confiance envers le prestataire","Autre"] },
  q12: { label:'Question 6 sur 11', text:"Qu'est-ce qui pourrait vous rassurer ou vous faire changer d'avis ?", type:'single', opts:["Une recommandation des pompes funèbres","Des avis de familles ayant utilisé ce service","Une meilleure connaissance de la prestation","Des tarifs plus accessibles","Une entreprise familiale","Rien, je préférerais toujours une autre solution","Autre"] },
  q13: { label:'Pour finir', text:"Un dernier mot ? (facultatif)", sub:"Y a-t-il une attente, une inquiétude ou une idée que vous souhaiteriez partager ?", type:'textarea' },
  fin: { type:'fin' }
};

function nextStep(from) {
  const q4 = A['q4'];
  if (inHesitantTail && from==='q6') return 'q7';
  if (inHesitantTail && from==='q7') { inHesitantTail=false; return 'q9'; }
  const map = {
    q1:'q2', q2:'q3',
    q3: A['q3']==='Oui' ? 'q3b' : 'q4',
    q3b:'q4',
    q4: (q4==='Oui, certainement'||q4==='Oui, probablement') ? 'q5' : 'q11',
    q5:'q6', q6:'q7', q7:'q8', q8:'q9', q9:'q10', q10:'q13',
    q11:'q12',
    q13:'fin'
  };
  if (from === 'q12') {
    if (q4==='Je ne sais pas') { inHesitantTail=true; return 'q6'; }
    return 'q9';
  }
  return map[from] || 'fin';
}

function getProgress() { return Math.min(100, Math.round((hist.length/12)*100)); }

function render(id) {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer=null; }
  document.getElementById('pb').style.width = getProgress()+'%';
  const s = steps[id];
  if (!s) return;

  if (s.type==='fin') {
    document.getElementById('card').innerHTML = `
      <div class="fin-card slide-in">
        <div class="fin-icon">🕊️</div>
        <div class="fin-title">Merci pour votre participation</div>
        <div class="fin-sub">Vos réponses sont précieuses et nous aideront à concevoir un service véritablement adapté aux besoins des familles.<br><br>Nous vous en remercions sincèrement.</div>
      </div>`;
    document.getElementById('pb').style.width='100%';
    saveResponse({...A});
    return;
  }

  const labelHtml = s.label ? `<div class="question-label">${s.label}</div>` : '';
  const subHtml   = s.sub   ? `<div class="sub-text">${s.sub}</div>` : '';
  let body='';

  if (s.type==='single') {
    const sel = A[id]||null;
    body = `<div class="options">`+s.opts.map(o=>{
      const esc=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="option ${sel===o?'selected':''}" onclick="selSingle('${id}',this,'${esc}')"><div class="check"></div><span>${o}</span></div>`;
    }).join('')+`</div>`;
  } else if (s.type==='multi') {
    const sel=A[id]||[];
    const hint=s.max<99?`<div class="max-hint">Jusqu'à ${s.max} réponses</div>`:'';
    body=hint+`<div class="options">`+s.opts.map(o=>{
      const esc=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="option ${sel.includes(o)?'selected':''}" onclick="selMulti('${id}',this,'${esc}',${s.max})"><div class="check check-sq"></div><span>${o}</span></div>`;
    }).join('')+`</div>`;
  } else if (s.type==='textarea') {
    body=`<textarea id="ta" placeholder="Votre réponse (facultatif)...">${A[id]||''}</textarea>`;
  }

  const isFirst=hist.length===0;
  const backBtn=isFirst?'':`<button class="btn btn-back" onclick="goBack()">← Retour</button>`;
  let nextBtn='';
  if (s.type==='multi') {
    const dis=(!A[id]||A[id].length===0)?'disabled':'';
    nextBtn=`<button class="btn btn-next" id="bn" onclick="goNext()" ${dis}>Continuer →</button>`;
  } else if (s.type==='textarea') {
    nextBtn=`<button class="btn btn-submit" onclick="goNext()">Envoyer mes réponses ✓</button>`;
  }

  document.getElementById('card').innerHTML=`
    <div class="slide-in">
      ${labelHtml}<div class="question-text">${s.text}</div>${subHtml}${body}
      <div class="btn-row">${backBtn}<div class="btn-row-right">${nextBtn}</div></div>
    </div>`;
}

function selSingle(id,el,val) {
  A[id]=val;
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected','confirmed'));
  el.classList.add('selected');
  autoTimer=setTimeout(()=>{ el.classList.add('confirmed'); setTimeout(()=>goNext(),120); },260);
}

function selMulti(id,el,val,max) {
  if (!A[id]) A[id]=[];
  if (el.classList.contains('selected')) { A[id]=A[id].filter(v=>v!==val); el.classList.remove('selected'); }
  else { if (A[id].length<max) { A[id].push(val); el.classList.add('selected'); } }
  const bn=document.getElementById('bn');
  if (bn) bn.disabled=A[id].length===0;
}

function goNext() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer=null; }
  const s=steps[currentId];
  if (s.type==='textarea') { const ta=document.getElementById('ta'); if(ta) A[currentId]=ta.value; }
  hist.push(currentId);
  currentId=nextStep(currentId);
  render(currentId);
}

function goBack() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer=null; }
  if (!hist.length) return;
  if (currentId==='q9'&&inHesitantTail) inHesitantTail=false;
  currentId=hist.pop();
  render(currentId);
}

// ══════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════
const ADMIN_PWD = 'azertyuiop';
let adminAuthenticated = false;
let currentTab = 'stats';

function showAdmin() {
  document.getElementById('adminOverlay').style.display='block';
  if (!adminAuthenticated) { renderLogin(); return; }
  renderAdmin();
}

function hideAdmin() {
  document.getElementById('adminOverlay').style.display='none';
}

function renderLogin() {
  document.getElementById('adminContent').innerHTML=`
    <div class="login-box">
      <div style="font-size:1.8rem;margin-bottom:12px;">🔒</div>
      <h2>Espace administrateur</h2>
      <p>Entrez le mot de passe pour accéder aux résultats</p>
      <input class="login-input" type="password" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkPwd()">
      <div class="login-error" id="loginErr">Mot de passe incorrect.</div>
      <button class="btn-login" onclick="checkPwd()">Accéder aux résultats</button>
      <div style="margin-top:16px"><button class="btn-back btn" onclick="hideAdmin()">← Retour</button></div>
    </div>`;
  setTimeout(()=>document.getElementById('pwdInput').focus(),100);
}

function checkPwd() {
  const val=document.getElementById('pwdInput').value;
  if (val===ADMIN_PWD) { adminAuthenticated=true; renderAdmin(); }
  else { document.getElementById('loginErr').style.display='block'; }
}

async function renderAdmin() {
  document.getElementById('adminContent').innerHTML=`<div style="text-align:center;padding:40px;color:#aaa;font-family:Arial,sans-serif;">Chargement…</div>`;
  const all = await loadAll();
  const total = all.length;
  const completed = all.filter(r=>r.q13!==undefined||r.q10||r.q9).length;
  const today = new Date().toLocaleDateString('fr-FR');
  const todayCount = all.filter(r=>r.date&&r.date.startsWith(today.split('/').reverse().join('/'))||
    (r.date&&r.date.includes(today.split('/')[0]+'/'+today.split('/')[1]+'/'+today.split('/')[2]))).length;

  // Stats par question
  function countOpts(key, opts) {
    const counts={};
    opts.forEach(o=>counts[o]=0);
    all.forEach(r=>{
      const v=r[key];
      if (!v) return;
      if (Array.isArray(v)) v.forEach(x=>{ if(counts[x]!==undefined) counts[x]++; });
      else if (counts[v]!==undefined) counts[v]++;
    });
    return counts;
  }

  function barChart(key, opts, question) {
    const counts=countOpts(key,opts);
    const max=Math.max(...Object.values(counts),1);
    const rows=opts.map(o=>{
      const pct=Math.round((counts[o]/max)*100);
      const abs=counts[o];
      return `<div class="bar-row">
        <div class="bar-label">${o}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-count">${abs}</div>
      </div>`;
    }).join('');
    return `<div class="q-block"><h3>${question}</h3>${rows}</div>`;
  }

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Réponses totales</div></div>
      <div class="stat-card"><div class="stat-num">${completed}</div><div class="stat-label">Questionnaires complets</div></div>
      <div class="stat-card"><div class="stat-num">${todayCount}</div><div class="stat-label">Aujourd'hui</div></div>
    </div>
    ${total===0?'<div class="empty-state">Aucune réponse enregistrée pour l\'instant.</div>':`
    <div class="section-title">Profil des répondants</div>
    ${barChart('q1',steps.q1.opts,steps.q1.text)}
    ${barChart('q2',steps.q2.opts,steps.q2.text)}
    ${barChart('q3',steps.q3.opts,steps.q3.text)}

    <div class="section-title">Intention & freins</div>
    ${barChart('q4',steps.q4.opts,steps.q4.text)}
    ${barChart('q11',steps.q11.opts,steps.q11.text)}
    ${barChart('q12',steps.q12.opts,steps.q12.text)}

    <div class="section-title">Attentes & préférences</div>
    ${barChart('q3b',steps.q3b.opts,steps.q3b.text)}
    ${barChart('q5',steps.q5.opts,steps.q5.text)}
    ${barChart('q6',steps.q6.opts,steps.q6.text)}
    ${barChart('q7',steps.q7.opts,steps.q7.text)}
    ${barChart('q8',steps.q8.opts,steps.q8.text)}

    <div class="section-title">Budget & canaux</div>
    ${barChart('q9',steps.q9.opts,steps.q9.text)}
    ${barChart('q10',steps.q10.opts,steps.q10.text)}
    `}`;

  // Réponses individuelles
  const repHtml = total===0
    ? '<div class="empty-state">Aucune réponse enregistrée pour l\'instant.</div>'
    : `<div class="responses-list">`+[...all].reverse().map((r,i)=>{
        const idx=total-i;
        const verbatim=r.q13?`<div class="verbatim">"${r.q13}"</div>`:'';
        const fmtVal=v=>Array.isArray(v)?v.join(', '):v||'—';
        return `<div class="response-card">
          <div class="rc-date">#${idx} · ${r.date||'Date inconnue'}</div>
          <div class="rc-row"><strong>Âge :</strong> ${fmtVal(r.q1)}</div>
          <div class="rc-row"><strong>Connaissait le service :</strong> ${fmtVal(r.q2)}</div>
          <div class="rc-row"><strong>A déjà organisé :</strong> ${fmtVal(r.q3)}${r.q3b?` — Difficultés : ${fmtVal(r.q3b)}`:''}</div>
          <div class="rc-row"><strong>Intention :</strong> ${fmtVal(r.q4)}</div>
          ${r.q5?`<div class="rc-row"><strong>Attentes :</strong> ${fmtVal(r.q5)}</div>`:''}
          ${r.q11?`<div class="rc-row"><strong>Freins :</strong> ${fmtVal(r.q11)}</div>`:''}
          ${r.q12?`<div class="rc-row"><strong>Levier de réassurance :</strong> ${fmtVal(r.q12)}</div>`:''}
          <div class="rc-row"><strong>Budget :</strong> ${fmtVal(r.q9)}</div>
          ${r.q13?`<div class="rc-row"><strong>Commentaire :</strong>${verbatim}</div>`:''}
        </div>`;
      }).join('')+`</div>`;

  function exportCSV() {
    const cols=['date','q1','q2','q3','q3b','q4','q5','q6','q7','q8','q9','q10','q11','q12','q13'];
    const header=cols.join(';');
    const rows=all.map(r=>cols.map(c=>{ const v=r[c]; return '"'+(Array.isArray(v)?v.join(', '):(v||'')).replace(/"/g,'""')+'"'; }).join(';'));
    const csv=[header,...rows].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='reponses_questionnaire.csv';
    a.click();
  }
  window._exportCSV=exportCSV;

  document.getElementById('adminContent').innerHTML=`
    <div class="admin-header">
      <div>
        <h2>Dashboard — Résultats du questionnaire</h2>
        <span>${total} réponse${total>1?'s':''} enregistrée${total>1?'s':''}</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn-export" onclick="window._exportCSV()">⬇ Export CSV</button>
        <button class="btn-admin-close" onclick="hideAdmin()">✕ Fermer</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='stats'?'active':''}" onclick="switchTab('stats')">📊 Statistiques</div>
      <div class="tab ${currentTab==='responses'?'active':''}" onclick="switchTab('responses')">📋 Réponses individuelles</div>
    </div>
    <div class="tab-content ${currentTab==='stats'?'active':''}" id="tabStats">${statsHtml}</div>
    <div class="tab-content ${currentTab==='responses'?'active':''}" id="tabResponses">${repHtml}</div>
  `;
}

function switchTab(t) {
  currentTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t==='stats'?'tabStats':'tabResponses').classList.add('active');
}

// ── URL routing : ?admin ──
if (window.location.search.includes('admin')) showAdmin();

render('q1');
</script>
</body>
</html>
